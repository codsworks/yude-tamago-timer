<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-labelledby="title desc">
  <title id="title">ゆで卵タイマー</title>
  <desc id="desc">卵のアイコンを添えたシンプルなタイトルロゴ</desc>
  <defs>
    <linearGradient id="eggShell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffefa" />
      <stop offset="1" stop-color="#fff0b4" />
    </linearGradient>
    <linearGradient id="word" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2f93a8" />
      <stop offset="1" stop-color="#263238" />
    </linearGradient>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#263238" flood-opacity="0.14" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="24" width="684" height="112" rx="56" fill="rgba(255,255,255,0.72)" />

    <g transform="translate(62 28)">
      <path
        d="M45 9 C68 9 87 39 87 69 C87 96 70 113 45 113 C20 113 3 96 3 69 C3 39 22 9 45 9 Z"
        fill="url(#eggShell)"
        stroke="#d7a648"
        stroke-width="7"
      />
      <circle cx="37" cy="63" r="4" fill="#263238" />
      <circle cx="55" cy="63" r="4" fill="#263238" />
      <path d="M37 77 Q46 84 55 77" fill="none" stroke="#ff7f51" stroke-width="5" stroke-linecap="round" />
      <circle cx="73" cy="31" r="8" fill="#ffbf3f" />
    </g>

    <text
      x="406"
      y="101"
      text-anchor="middle"
      font-family="'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Yu Gothic', Meiryo, system-ui, sans-serif"
      font-size="58"
      font-weight="900"
      letter-spacing="1"
      fill="url(#word)"
    >ゆで卵タイマー</text>
  </g>
</svg>
