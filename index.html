<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ゆで卵タイマー</title>
    <meta name="description" content="1cmの水でゆで卵を作るためのタイマー" />
    <meta name="theme-color" content="#ffbf3f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ゆで卵タイマー" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ゆで卵タイマー" />
    <meta property="og:description" content="1cmの水でゆで卵を作るためのタイマー" />
    <meta property="og:url" content="https://codsworks.github.io/yude-tamago-timer/" />
    <meta property="og:image" content="https://codsworks.github.io/yude-tamago-timer/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ゆで卵タイマー" />
    <meta name="twitter:description" content="1cmの水でゆで卵を作るためのタイマー" />
    <meta name="twitter:image" content="https://codsworks.github.io/yude-tamago-timer/icon-512.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icon-512.png" />
    <style>
      :root {
        color-scheme: light;
        --ink: #263238;
        --muted: #66727a;
        --cream: #fff8dc;
        --egg: #fff2b6;
        --yolk: #ffbf3f;
        --pot: #54b7c8;
        --pot-dark: #287c91;
        --heat: #ff6f59;
        --leaf: #71bc78;
        --panel: rgba(255, 255, 255, 0.88);
        --shadow: 0 22px 60px rgba(45, 55, 72, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo,
          system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 18%, rgba(255, 191, 63, 0.34) 0 120px, transparent 121px),
          radial-gradient(circle at 92% 10%, rgba(113, 188, 120, 0.24) 0 150px, transparent 151px),
          linear-gradient(135deg, #fff1a8 0%, #ffd3bb 46%, #b6ecf0 100%);
      }

      button {
        font: inherit;
      }

      .app {
        width: min(430px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 10px 12px 14px;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .hero {
        display: grid;
        gap: 2px;
      }

      h1 {
        margin: 0;
        line-height: 1;
        text-align: center;
      }

      .title-logo {
        display: block;
        width: min(344px, 92vw);
        height: auto;
        margin: 0 auto;
      }

      .guide-button {
        position: absolute;
        top: 50%;
        min-width: 64px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        padding: 0 9px;
        background: #fffef8;
        color: #287c91;
        font-size: 0.78rem;
        font-weight: 950;
        box-shadow: 0 3px 0 rgba(40, 124, 145, 0.22);
        transform: translateY(-50%);
        cursor: pointer;
        z-index: 8;
      }

      .guide-button.home {
        left: 4px;
      }

      .guide-button.share {
        right: 4px;
      }

      .guide-button[hidden] {
        display: none;
      }

      .kitchen {
        position: relative;
        min-height: 102px;
        margin-top: -10px;
        margin-bottom: -12px;
        display: grid;
        place-items: center;
      }

      .steam {
        position: absolute;
        top: 0;
        width: 14px;
        height: 36px;
        border-radius: 50%;
        border-left: 5px solid rgba(255, 255, 255, 0.76);
        animation: steam 2.7s ease-in-out infinite;
      }

      .steam:nth-child(1) {
        left: 32%;
      }

      .steam:nth-child(2) {
        left: 48%;
        height: 46px;
        animation-delay: 0.55s;
      }

      .steam:nth-child(3) {
        left: 64%;
        animation-delay: 1.05s;
      }

      @keyframes steam {
        0%, 100% {
          opacity: 0.3;
          transform: translateY(14px) scale(0.9);
        }
        50% {
          opacity: 1;
          transform: translateY(-12px) scale(1.08);
        }
      }

      .app.resting .steam {
        border-left-color: rgba(255, 255, 255, 0.34);
        animation: steamRest 5.4s ease-in-out infinite;
      }

      .app.finished .steam {
        display: none;
      }

      @keyframes steamRest {
        0%, 100% {
          opacity: 0.12;
          transform: translateY(10px) scale(0.92);
        }
        50% {
          opacity: 0.38;
          transform: translateY(-8px) scale(1.02);
        }
      }

      .pot-scene {
        position: relative;
        width: min(226px, 72vw);
        aspect-ratio: 1.24;
        transform: translateY(-8px);
      }

      .plate-scene {
        position: relative;
        display: none;
        width: min(226px, 72vw);
        aspect-ratio: 1.24;
        transform: translateY(-8px);
      }

      .app.finished .pot-scene {
        display: none;
      }

      .app.finished .plate-scene {
        display: block;
      }

      .lid {
        position: absolute;
        left: 12%;
        top: 25%;
        width: 76%;
        height: 15%;
        border-radius: 55% 55% 18% 18%;
        background: #7ed6df;
        border: 5px solid var(--pot-dark);
        transform: rotate(-3deg);
        animation: lidRattle 0.82s ease-in-out infinite;
        z-index: 4;
      }

      .lid::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -18px;
        width: 16%;
        height: 20px;
        border-radius: 999px 999px 10px 10px;
        background: var(--yolk);
        border: 4px solid #a7602c;
        transform: translateX(-50%);
      }

      .app.resting .lid {
        animation: none;
        transform: rotate(0deg);
      }

      .pot {
        position: absolute;
        left: 12%;
        right: 12%;
        bottom: 20%;
        height: 42%;
        border-radius: 0 0 46px 46px;
        background: linear-gradient(145deg, #70d3e0 0%, var(--pot) 54%, #3fa1b5 100%);
        border: 5px solid var(--pot-dark);
        box-shadow: var(--shadow);
        z-index: 3;
        overflow: hidden;
      }

      .pot::before {
        content: "";
        position: absolute;
        inset: 12px 18px auto;
        height: 26%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.32);
      }

      .pot::after {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        bottom: 10px;
        height: 8px;
        border-radius: 999px;
        background: rgba(38, 50, 56, 0.14);
      }

      .plate {
        position: absolute;
        left: 2%;
        right: 2%;
        bottom: 15%;
        height: 40%;
        border-radius: 50%;
        background: linear-gradient(180deg, #ffffff 0%, #edf7f8 100%);
        border: 5px solid rgba(47, 147, 168, 0.34);
        box-shadow: var(--shadow);
      }

      .plate::after {
        content: "";
        position: absolute;
        inset: 24% 18%;
        border-radius: 50%;
        border: 3px solid rgba(47, 147, 168, 0.18);
      }

      .finished-egg {
        position: absolute;
        width: 20%;
        aspect-ratio: 0.78;
        border-radius: 58% 58% 54% 54% / 66% 66% 48% 48%;
        background: linear-gradient(155deg, #fffef3 0%, var(--egg) 100%);
        border: 4px solid #d2a95a;
        z-index: 2;
      }

      .finished-egg.one {
        left: 26%;
        bottom: 36%;
        transform: rotate(-8deg);
      }

      .finished-egg.two {
        right: 24%;
        bottom: 34%;
        transform: rotate(9deg);
      }

      .egg {
        position: absolute;
        width: 20%;
        aspect-ratio: 0.78;
        border-radius: 58% 58% 54% 54% / 66% 66% 48% 48%;
        background: linear-gradient(155deg, #fffef3 0%, var(--egg) 100%);
        border: 4px solid #d2a95a;
        z-index: 5;
        display: grid;
        place-items: center;
      }

      .egg.one {
        left: 30%;
        top: calc(43% - 2px);
        animation: eggWiggleOne 2.2s ease-in-out infinite;
      }

      .egg.two {
        right: 24%;
        top: calc(46% - 2px);
        animation: eggWiggleTwo 2.35s ease-in-out infinite;
        animation-delay: 0.28s;
      }

      @keyframes lidRattle {
        0%, 100% {
          transform: translate(0, 0) rotate(-3deg);
        }
        25% {
          transform: translate(-1px, -1px) rotate(-4deg);
        }
        50% {
          transform: translate(1px, -0.5px) rotate(-2deg);
        }
        75% {
          transform: translate(-0.5px, 0.5px) rotate(-3.5deg);
        }
      }

      @keyframes eggWiggleOne {
        0%, 100% {
          transform: translateX(-4px) rotate(-13deg);
        }
        50% {
          transform: translateX(5px) rotate(-7deg);
        }
      }

      @keyframes eggWiggleTwo {
        0%, 100% {
          transform: translateX(5px) rotate(11deg);
        }
        50% {
          transform: translateX(-4px) rotate(6deg);
        }
      }

      .flame {
        position: absolute;
        bottom: 7%;
        width: 15%;
        aspect-ratio: 0.72;
        border-radius: 58% 58% 58% 12%;
        background: linear-gradient(145deg, #ffd166, var(--heat) 70%);
        transform: rotate(45deg);
        animation: flame 0.72s ease-in-out infinite alternate;
        z-index: 1;
      }

      .flame:nth-last-child(3) {
        left: 31%;
      }

      .flame:nth-last-child(2) {
        left: 45%;
        animation-delay: 0.16s;
      }

      .flame:nth-last-child(1) {
        left: 58%;
        animation-delay: 0.32s;
      }

      .app.resting .flame {
        animation: none;
        opacity: 0;
      }

      @keyframes flame {
        from {
          transform: translateY(7px) rotate(45deg) scale(0.92);
        }
        to {
          transform: translateY(-3px) rotate(45deg) scale(1.05);
        }
      }

      .timer-panel {
        background: var(--panel);
        border: 3px solid rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .time {
        margin: 0 0 8px;
        color: #3f4a50;
        font-size: clamp(2.05rem, 12vw, 3rem);
        line-height: 1;
        font-variant-numeric: tabular-nums;
        font-weight: 950;
        text-align: center;
      }

      .instruction {
        margin: 0 0 10px;
        padding: 10px;
        border-radius: 16px;
        background: #fff8d8;
        border: 2px solid rgba(255, 191, 63, 0.6);
      }

      .instruction-label {
        display: block;
        margin-bottom: 3px;
        color: #a45f15;
        font-size: 0.78rem;
        font-weight: 950;
      }

      .instruction-text {
        margin: 0;
        color: #3f4a50;
        font-size: 0.94rem;
        line-height: 1.45;
        font-weight: 900;
        white-space: pre-line;
      }

      .controls,
      .doneness,
      .alarm-samples {
        display: grid;
        gap: 8px;
      }

      .controls {
        grid-template-columns: 1.25fr 0.75fr;
        margin-top: 10px;
      }

      .button {
        min-height: 64px;
        border: 0;
        border-radius: 15px;
        padding: 10px 8px;
        color: #fff;
        background: var(--ink);
        font-weight: 950;
        box-shadow: 0 5px 0 rgba(38, 50, 56, 0.14);
        cursor: pointer;
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          opacity 0.16s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 rgba(38, 50, 56, 0.14);
      }

      .button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(38, 50, 56, 0.14);
      }

      .button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .start {
        background: #ff7f51;
      }

      .start.reset {
        background: #2f9e74;
      }

      .stop {
        background: #52616b;
      }

      .doneness {
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }

      .choice {
        min-height: 62px;
        border: 2px solid #d9edf0;
        border-radius: 14px;
        padding: 7px 4px;
        background: linear-gradient(180deg, #ffffff 0%, #eaf8fb 100%);
        color: var(--ink);
        font-weight: 950;
        cursor: pointer;
        line-height: 1.25;
        box-shadow: 0 4px 0 rgba(40, 124, 145, 0.18);
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          border-color 0.16s ease,
          background 0.16s ease;
      }

      .choice:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 0 rgba(40, 124, 145, 0.18);
      }

      .choice:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 rgba(40, 124, 145, 0.18);
      }

      .choice span {
        display: block;
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 800;
      }

      .choice.active {
        color: #4a2b00;
      }

      .choice:nth-child(1).active {
        border-color: #cf6d12;
        background: linear-gradient(180deg, #ffb24a 0%, #f08a1a 100%);
        box-shadow: 0 4px 0 rgba(147, 77, 12, 0.38);
      }

      .choice:nth-child(2).active {
        border-color: #c99c00;
        background: linear-gradient(180deg, #ffd95a 0%, #f3bc18 100%);
        box-shadow: 0 4px 0 rgba(139, 105, 0, 0.34);
      }

      .choice:nth-child(3).active {
        border-color: #d4c24f;
        background: linear-gradient(180deg, #fff4a5 0%, #ead95f 100%);
        box-shadow: 0 4px 0 rgba(130, 118, 32, 0.3);
      }

      .choice:disabled {
        color: #7f8a91;
        background: #eef2f3;
        border-color: #d5dcdf;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }

      .choice:disabled span {
        color: #98a2a8;
      }

      .choice.active:disabled {
        color: #4a2b00;
        opacity: 1;
      }

      .choice:nth-child(1).active:disabled {
        border-color: #cf6d12;
        background: linear-gradient(180deg, #ffb24a 0%, #f08a1a 100%);
        box-shadow: 0 4px 0 rgba(147, 77, 12, 0.38);
      }

      .choice:nth-child(2).active:disabled {
        border-color: #c99c00;
        background: linear-gradient(180deg, #ffd95a 0%, #f3bc18 100%);
        box-shadow: 0 4px 0 rgba(139, 105, 0, 0.34);
      }

      .choice:nth-child(3).active:disabled {
        border-color: #d4c24f;
        background: linear-gradient(180deg, #fff4a5 0%, #ead95f 100%);
        box-shadow: 0 4px 0 rgba(130, 118, 32, 0.3);
      }

      .alarm-samples {
        margin-top: 10px;
      }

      .sample {
        width: 100%;
        min-height: 46px;
        border: 2px solid #d9edf0;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #eef9fb 100%);
        color: var(--ink);
        font-weight: 950;
        box-shadow: 0 4px 0 rgba(40, 124, 145, 0.18);
        cursor: pointer;
      }

      .sample.active {
        color: #fff;
        border-color: #287c91;
        background: linear-gradient(180deg, #58bed0 0%, #2f93a8 100%);
        box-shadow: 0 4px 0 rgba(32, 97, 113, 0.34);
      }

      .sample:disabled {
        color: #7f8a91;
        background: #eef2f3;
        border-color: #d5dcdf;
        box-shadow: none;
        cursor: not-allowed;
      }

      .sample.active:disabled {
        color: #fff;
        border-color: #287c91;
        background: linear-gradient(180deg, #58bed0 0%, #2f93a8 100%);
        box-shadow: 0 4px 0 rgba(32, 97, 113, 0.34);
      }

      .sample-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 0;
        background: #fff7df;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.22s ease,
          visibility 0.22s ease;
        z-index: 20;
      }

      .sample-modal.open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .sample-dialog {
        width: 100%;
        max-width: 430px;
        height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #fff7df;
        box-shadow: none;
        transform: translateY(16px) scale(0.98);
        transition: transform 0.24s ease;
      }

      .sample-modal.open .sample-dialog {
        transform: translateY(0) scale(1);
      }

      .sample-dialog-header {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 60px;
        padding: 10px 12px;
        background: #fffef8;
        border-bottom: 2px solid rgba(243, 177, 56, 0.32);
      }

      .sample-dialog-title {
        margin: 0;
        color: #d76b2a;
        font-size: 1rem;
        font-weight: 950;
        text-align: center;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .sample-close {
        position: absolute;
        left: 8px;
        top: 10px;
        width: 42px;
        height: 40px;
        border: 0;
        border-radius: 12px;
        background: #f0f4f5;
        color: #52636a;
        font-size: 1.2rem;
        font-weight: 950;
        line-height: 1;
        box-shadow: 0 3px 0 #cbd5d8;
        cursor: pointer;
      }

      .sample-confirm {
        position: absolute;
        right: 8px;
        top: 10px;
        width: 74px;
        min-width: 74px;
        height: 40px;
        border: 0;
        border-radius: 12px;
        background: #ff8a4b;
        color: #fff;
        font-weight: 950;
        box-shadow: 0 3px 0 #d7652a;
        cursor: pointer;
      }

      .sample-confirm:disabled {
        background: #d8e0e3;
        color: #7e8d94;
        box-shadow: none;
        cursor: not-allowed;
      }

      .modal-sample-list {
        display: grid;
        grid-auto-rows: max-content;
        align-content: start;
        gap: 5px;
        overflow-y: auto;
        padding: 6px 8px;
        background: #fff7df;
      }

      .modal-sample {
        padding: 0;
        border: 2px solid rgba(255, 188, 69, 0.62);
        border-radius: 15px;
        background: #fffef8;
        overflow: hidden;
      }

      .modal-sample.pending {
        border-color: #287c91;
      }

      .modal-sample-button {
        width: 100%;
        height: 44px;
        border: 0;
        appearance: none;
        display: block;
        padding: 6px 8px;
        background: #fffef8;
        color: #273b42;
        font-weight: 950;
        line-height: 1;
        cursor: pointer;
      }

      .modal-sample.pending .modal-sample-button {
        background: linear-gradient(180deg, #58bed0 0%, #2f93a8 100%);
        color: #fff;
      }

      .info-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 0;
        background: #fff7df;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.22s ease,
          visibility 0.22s ease;
        z-index: 30;
      }

      .info-modal.open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .info-dialog {
        width: 100%;
        max-width: 430px;
        height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #fff7df;
        box-shadow: none;
        transform: translateY(16px) scale(0.98);
        transition: transform 0.24s ease;
      }

      .info-modal.open .info-dialog {
        transform: translateY(0) scale(1);
      }

      .info-header {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 60px;
        padding: 10px 56px;
        background: #fffef8;
        border-bottom: 2px solid rgba(243, 177, 56, 0.32);
      }

      .info-title {
        margin: 0;
        color: #d76b2a;
        font-size: 1rem;
        font-weight: 950;
        text-align: center;
      }

      .info-close {
        position: absolute;
        top: 10px;
        left: 8px;
        width: 42px;
        height: 40px;
        border: 0;
        border-radius: 12px;
        background: #f0f4f5;
        color: #52636a;
        font-size: 1.2rem;
        font-weight: 950;
        box-shadow: 0 3px 0 #cbd5d8;
        cursor: pointer;
      }

      .info-body {
        display: grid;
        gap: 12px;
        overflow-y: auto;
        padding: 12px;
      }

      .info-dialog.share-mode .info-body {
        align-content: start;
        gap: 8px;
        padding: 8px;
      }

      .info-dialog.home-mode .info-body {
        align-content: start;
        gap: 8px;
        padding: 8px;
      }

      .info-section {
        padding: 12px;
        border: 2px solid rgba(255, 188, 69, 0.52);
        border-radius: 16px;
        background: #fffef8;
      }

      .info-dialog.share-mode .info-section {
        padding: 8px;
      }

      .info-dialog.home-mode .info-section {
        padding: 8px;
      }

      .info-section[hidden] {
        display: none;
      }

      .info-section h2 {
        margin: 0 0 8px;
        color: #a45f15;
        font-size: 0.92rem;
        font-weight: 950;
      }

      .info-section p,
      .info-section ol {
        margin: 0;
        color: #3f4a50;
        font-size: 0.86rem;
        font-weight: 850;
        line-height: 1.55;
      }

      .info-section ol {

  <body>
    <main class="app">

    <script>
      const IS_DEBUG = new URLSearchParams(window.location.search).has("debug");
      const FIRST_ALARM_SECONDS = IS_DEBUG ? 8 : 4 * 60;

      const appEl = document.querySelector(".app");
      appEl.classList.toggle("debug", IS_DEBUG);
      const timeEl = document.querySelector("#time");
      const startButton = document.querySelector("#start");
      const stopButton = document.querySelector("#stop");
      const openHomeGuideButton = document.querySelector("#openHomeGuide");
      const openShareGuideButton = document.querySelector("#openShareGuide");
      const closeInfoButton = document.querySelector("#closeInfo");
      const openSamplesButton = document.querySelector("#openSamples");
      const closeSamplesButton = document.querySelector("#closeSamples");
      const confirmSampleButton = document.querySelector("#confirmSample");
      const infoModal = document.querySelector("#infoModal");
      const infoDialog = document.querySelector(".info-dialog");
      const shareAppButton = document.querySelector("#shareApp");
      const copyAppUrlButton = document.querySelector("#copyAppUrl");
      const shareQrEl = document.querySelector("#shareQr");
      const sampleModal = document.querySelector("#sampleModal");
      const modalSampleList = document.querySelector("#modalSampleList");
      const choiceButtons = [...document.querySelectorAll(".choice")];
      const sampleButtons = [...document.querySelectorAll(".sample")];
      const instructionLabelEl = document.querySelector("#instructionLabel");
      const instructionTextEl = document.querySelector("#instructionText");
      const toastEl = document.querySelector("#toast");

      const ALARM_VOLUME = 100;
      const SHARE_URL = "https://codsworks.github.io/yude-tamago-timer/";
      const SHARE_QR_MATRIX = ["11111110001010001001101111111","10000010101000011000001000001","10111010000010111000001011101","10111010111011100101001011101","10111010010000001011101011101","10000010110111111110001000001","11111110101010101010101111111","00000000011100110010100000000","11111011110101110110110101010","01010001001011001111101110001","01101110101001110100100100000","11011101000010111010001011010","10110011111011011101000101100","00011000110001001111111110001","00101110000110111010101011100","01000001000100111001101110010","11110111010111100100000001100","10100101011010100111101110101","10000111000000111100010100100","10011001110100011001111100010","10100111100111110111111110111","00000000111111001110100011111","11111110101010010101101011100","10000010011110111000100010011","10111010101001110100111110101","10111010110101001101100001111","10111010101000111010011111110","10000010101000111001111101010","11111110111011111101001010100"];
      const ALARM_SAMPLES = [
        {
          id: 2,
          name: "ふわっと上昇",
          gap: 0.6,
          notes: [
            { frequency: 523, at: 0, duration: 0.13, type: "sine", volume: 0.04 },
            { frequency: 784, at: 0.11, duration: 0.16, type: "sine", volume: 0.045 },
            { frequency: 1047, at: 0.25, duration: 0.24, type: "triangle", volume: 0.038 },
            { frequency: 2093, at: 0.3, duration: 0.14, type: "sine", volume: 0.018 },
          ],
        },
        {
          id: 5,
          name: "朝のベル",
          gap: 0.75,
          notes: [
            { frequency: 698, at: 0, duration: 0.14, type: "sine", volume: 0.033 },
            { frequency: 1047, at: 0.15, duration: 0.2, type: "triangle", volume: 0.03 },
            { frequency: 1397, at: 0.36, duration: 0.2, type: "sine", volume: 0.022 },
          ],
        },
        {
          id: 7,
          name: "キッチンチャイム",
          gap: 0.72,
          notes: [
            { frequency: 880, at: 0, duration: 0.12, type: "sine", volume: 0.032 },
            { frequency: 880, at: 0.18, duration: 0.12, type: "sine", volume: 0.032 },
            { frequency: 1175, at: 0.38, duration: 0.18, type: "triangle", volume: 0.028 },
          ],
        },
        {
          id: 8,
          name: "小さなファンファーレ",
          gap: 0.88,
          notes: [
            { frequency: 523, at: 0, duration: 0.11, type: "triangle", volume: 0.035 },
            { frequency: 659, at: 0.12, duration: 0.11, type: "triangle", volume: 0.035 },
            { frequency: 784, at: 0.24, duration: 0.14, type: "triangle", volume: 0.034 },
            { frequency: 1047, at: 0.4, duration: 0.28, type: "sine", volume: 0.028 },
          ],
        },
        {
          id: 9,
          name: "お知らせコロン",
          gap: 0.58,
          notes: [
            { frequency: 784, at: 0, duration: 0.16, type: "sine", volume: 0.034 },
            { frequency: 1047, at: 0.18, duration: 0.22, type: "sine", volume: 0.03 },
          ],
        },
        {
          id: 12,
          name: "ころころベル",
          gap: 0.7,
          notes: [
            { frequency: 1047, at: 0, duration: 0.08, type: "sine", volume: 0.028 },
            { frequency: 1319, at: 0.1, duration: 0.08, type: "sine", volume: 0.026 },
            { frequency: 1047, at: 0.2, duration: 0.08, type: "sine", volume: 0.028 },
            { frequency: 1568, at: 0.34, duration: 0.16, type: "triangle", volume: 0.022 },
          ],
        },
        {
          id: 14,
          name: "ポンポンチャイム",
          gap: 0.64,
          notes: [
            { frequency: 494, at: 0, duration: 0.11, type: "triangle", volume: 0.04 },
            { frequency: 494, at: 0.15, duration: 0.11, type: "triangle", volume: 0.04 },
            { frequency: 740, at: 0.32, duration: 0.18, type: "sine", volume: 0.03 },
          ],
        },
        {
          id: 15,
          name: "クリーン通知",
          gap: 0.62,
          notes: [
            { frequency: 1047, at: 0, duration: 0.12, type: "sine", volume: 0.03 },
            { frequency: 1319, at: 0.17, duration: 0.14, type: "sine", volume: 0.026 },
          ],
        },
        {
          id: 17,
          name: "ミニマルベル",
          gap: 0.7,
          notes: [
            { frequency: 880, at: 0, duration: 0.18, type: "sine", volume: 0.032 },
            { frequency: 1760, at: 0.04, duration: 0.14, type: "sine", volume: 0.01 },
            { frequency: 1175, at: 0.28, duration: 0.18, type: "triangle", volume: 0.026 },
          ],
        },
        {
          id: 19,
          name: "まろやか完了",
          gap: 0.92,
          notes: [
            { frequency: 523, at: 0, duration: 0.18, type: "sine", volume: 0.032 },
            { frequency: 659, at: 0.19, duration: 0.18, type: "sine", volume: 0.028 },
            { frequency: 784, at: 0.4, duration: 0.28, type: "triangle", volume: 0.026 },
          ],
        },
      ];
      const savedSoundText = localStorage.getItem("eggTimerSound");
      const savedSound = savedSoundText === null ? 2 : Number(savedSoundText);
      const savedAfterText = localStorage.getItem("eggTimerAfterSeconds");
      const savedAfterSeconds = savedAfterText === null ? 240 : Number(savedAfterText);
      const savedAfterButton =
        choiceButtons.find((button) => button.dataset.after === String(savedAfterSeconds)) ||
        choiceButtons.find((button) => button.classList.contains("active")) ||
        choiceButtons[1];
      let afterBoilSeconds = Number(
        IS_DEBUG ? savedAfterButton.dataset.debugAfter : savedAfterButton.dataset.after
      );
      let remainingSeconds = FIRST_ALARM_SECONDS + afterBoilSeconds;
      let timerId = null;
      let startedAt = 0;
      let endsAt = 0;
      let firstAlarmAt = 0;
      let firstAlarmPlayed = false;
      let isFinished = false;
      let audioContext = null;
      let wakeLock = null;
      let selectedSound = ALARM_SAMPLES.some((sample) => sample.id === savedSound) ? savedSound : 2;
      let pendingSound = null;
      let debugSamples = null;
      let lastInfoTrigger = openShareGuideButton;

      const formatTime = (seconds) => {
        const safeSeconds = Math.max(0, Math.ceil(seconds));
        const minutes = String(Math.floor(safeSeconds / 60));
        const rest = String(safeSeconds % 60).padStart(2, "0");
        return `${minutes}:${rest}`;
      };

      const totalSeconds = () => FIRST_ALARM_SECONDS + afterBoilSeconds;

      const afterSecondsFor = (button) =>
        Number(IS_DEBUG ? button.dataset.debugAfter : button.dataset.after);

      const updateChoiceSelection = () => {
        const selectedAfterSeconds = IS_DEBUG
          ? choiceButtons.find((button) => afterSecondsFor(button) === afterBoilSeconds)?.dataset.after
          : String(afterBoilSeconds);

        choiceButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.after === selectedAfterSeconds);
        });
      };

      const updateInstruction = (label, text) => {
        instructionLabelEl.textContent = label;
        instructionTextEl.textContent = text;
      };

      const updateKitchenState = () => {
        appEl.classList.toggle("resting", firstAlarmPlayed);
        appEl.classList.toggle("finished", isFinished);
      };

      const clearTimerState = () => {
        localStorage.removeItem("eggTimerState");
      };

      const isPwaMode = () => {
        return (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        );
      };

      const registerServiceWorker = async () => {
        if (!("serviceWorker" in navigator) || window.location.protocol === "file:") return;

        try {
          await navigator.serviceWorker.register("./sw.js");
        } catch (error) {
          console.error("Service worker setup failed", error);
        }
      };

      const saveTimerState = () => {
        if (!timerId && !isFinished) return;

        localStorage.setItem(
          "eggTimerState",
          JSON.stringify({
            afterBoilSeconds,
            endsAt,
            firstAlarmAt,
            firstAlarmPlayed,
            isFinished,
            selectedSound,
            startedAt,
          })
        );
      };

      const updateIdleDisplay = () => {
        updateKitchenState();
        remainingSeconds = totalSeconds();
        timeEl.textContent = formatTime(FIRST_ALARM_SECONDS);
        updateInstruction(
          "準備",
          "1. 鍋に1cmの水を入れる\n2. 冷蔵庫から卵をだして鍋にいれる\n3. 鍋を火にかける\n4. 沸騰したら中火にして蓋をする\n5. スタートをタップ！"
        );
      };

      const showToast = (message) => {
        toastEl.textContent = message;
        toastEl.classList.add("show");
        window.setTimeout(() => toastEl.classList.remove("show"), 6000);
      };

      const setupShareGuide = () => {
        const context = shareQrEl.getContext("2d");
        const size = shareQrEl.width;
        const quiet = 4;
        const modules = SHARE_QR_MATRIX.length;
        const cell = size / (modules + quiet * 2);

        context.fillStyle = "#fff";
        context.fillRect(0, 0, size, size);
        context.fillStyle = "#111";
        SHARE_QR_MATRIX.forEach((row, y) => {
          [...row].forEach((value, x) => {
            if (value === "1") {
              context.fillRect((x + quiet) * cell, (y + quiet) * cell, cell, cell);
            }
          });
        });
      };

      const openInfoModal = (mode, trigger) => {
        lastInfoTrigger = trigger;
        document.querySelectorAll("[data-info-mode]").forEach((section) => {
          section.hidden = section.dataset.infoMode !== mode;
        });
        if (mode === "share") {
          setupShareGuide();
        }
        infoDialog.classList.toggle("share-mode", mode === "share");
        infoDialog.classList.toggle("home-mode", mode === "home");
        document.querySelector("#infoTitle").textContent =
          mode === "home" ? "ホームに追加" : "シェア";
        infoModal.classList.add("open");
        infoModal.setAttribute("aria-hidden", "false");
        closeInfoButton.focus();
      };

      const closeInfoModal = () => {
        infoModal.classList.remove("open");
        infoModal.setAttribute("aria-hidden", "true");
        lastInfoTrigger.focus();
      };

      const updateGuideButtons = () => {
        openHomeGuideButton.hidden = isPwaMode();
      };

      const shareApp = async () => {
        if (navigator.share) {
          try {
            await navigator.share({
              title: "ゆで卵タイマー",
              text: "ゆで卵タイマー",
              url: SHARE_URL,
            });
            return;
          } catch {
            return;
          }
        }

        await copyShareUrl();
      };

      const copyShareUrl = async () => {
        try {
          await navigator.clipboard.writeText(SHARE_URL);
          showToast("URLをコピーしました");
        } catch {
          showToast(SHARE_URL);
        }
      };

      const requestWakeLock = async () => {
        if (!("wakeLock" in navigator) || wakeLock || document.hidden) return;

        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch {
          wakeLock = null;
        }
      };

      const releaseWakeLock = async () => {
        if (!wakeLock) return;

        try {
          await wakeLock.release();
        } catch {
          wakeLock = null;
        }
      };

      const updateSoundSelection = () => {
        loadDebugSamples().then((samples) => {
          const selectedSample = samples.find((sample) => sample.id === selectedSound) || samples[0];
          if (selectedSample) {
            openSamplesButton.textContent = `♪${selectedSample.name}`;
            openSamplesButton.setAttribute("aria-label", `アラーム選択: ${selectedSample.name}`);
          }

          modalSampleList.querySelectorAll(".modal-sample").forEach((card) => {
            card.classList.toggle("pending", Number(card.dataset.sound) === pendingSound);
          });
        });
      };

      const loadDebugSamples = async () => {
        if (debugSamples) return debugSamples;

        debugSamples = ALARM_SAMPLES;
        return debugSamples;
      };

      const playDebugSample = async (sample) => {
        pendingSound = sample.id;
        updateSoundSelection();
        confirmSampleButton.disabled = false;

        const canPlay = await ensureAudioContext();
        if (!canPlay) return;

        const now = audioContext.currentTime;
        for (let i = 0; i < 2; i += 1) {
          const offset = i * sample.gap;
          sample.notes.forEach((note) => {
            playTone(
              note.frequency,
              now + offset + note.at,
              note.duration,
              note.type,
              note.volume,
              note.endFrequency ?? note.frequency
            );
          });
        }
      };

      const selectDebugSample = () => {
        if (pendingSound === null) return;

        selectedSound = pendingSound;
        localStorage.setItem("eggTimerSound", String(selectedSound));
        updateSoundSelection();
        closeSampleModal();
      };

      const renderDebugSamples = async () => {
        if (modalSampleList.children.length) return;

        modalSampleList.textContent = "読み込み中...";
        const samples = await loadDebugSamples();
        modalSampleList.textContent = "";

        samples.forEach((sample) => {
          const card = document.createElement("article");
          card.className = "modal-sample";
          card.dataset.sound = String(sample.id);
          card.innerHTML = `
            <button class="modal-sample-button" type="button" aria-label="${sample.name}を試聴">♪${sample.name}</button>
          `;
          card
            .querySelector(".modal-sample-button")
            .addEventListener("click", () => playDebugSample(sample));
          modalSampleList.append(card);
        });
        updateSoundSelection();
      };

      const openSampleModal = async () => {
        pendingSound = selectedSound;
        await renderDebugSamples();
        confirmSampleButton.disabled = false;
        updateSoundSelection();
        sampleModal.classList.add("open");
        sampleModal.setAttribute("aria-hidden", "false");
        confirmSampleButton.focus();
      };

      const closeSampleModal = () => {
        pendingSound = null;
        updateSoundSelection();
        sampleModal.classList.remove("open");
        sampleModal.setAttribute("aria-hidden", "true");
        openSamplesButton.focus();
      };

      const ensureAudioContext = async () => {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return false;

        try {
          audioContext ||= new AudioContextClass();
          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }
          return true;
        } catch {
          return false;
        }
      };

      const playTone = (frequency, startsAt, duration, type = "sine", volume = 0.44, endFrequency = frequency) => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startsAt);
        if (endFrequency !== frequency) {
          oscillator.frequency.exponentialRampToValueAtTime(endFrequency, startsAt + duration * 0.82);
        }

        gain.gain.setValueAtTime(0.0001, startsAt);
        gain.gain.exponentialRampToValueAtTime(volume * ALARM_VOLUME, startsAt + 0.028);
        gain.gain.exponentialRampToValueAtTime(0.0001, startsAt + duration);
        oscillator.connect(gain).connect(audioContext.destination);
        oscillator.start(startsAt);
        oscillator.stop(startsAt + duration + 0.03);
      };

      const playAlarmSound = async (count = 2) => {
        const canPlay = await ensureAudioContext();
        if (!canPlay) return;

        const now = audioContext.currentTime;
        const samples = await loadDebugSamples();
        const sound = samples.find((sample) => sample.id === selectedSound) || samples[0];
        if (!sound) return;

        for (let i = 0; i < count; i += 1) {
          const offset = i * sound.gap;
          sound.notes.forEach((note) => {
            playTone(
              note.frequency,
              now + offset + note.at,
              note.duration,
              note.type,
              note.volume,
              note.endFrequency ?? note.frequency
            );
          });
        }
      };

      const setRunning = (isRunning) => {
        if (isRunning) {
          isFinished = false;
          startButton.textContent = "スタート";
          startButton.classList.remove("reset");
          updateKitchenState();
        }

        startButton.disabled = isRunning;
        stopButton.disabled = !isRunning;
        choiceButtons.forEach((button) => {
          button.disabled = isRunning;
        });
        sampleButtons.forEach((button) => {
          button.disabled = isRunning;
        });
      };

      const resetTimer = () => {
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
        }
        isFinished = false;
        firstAlarmPlayed = false;
        updateKitchenState();
        startButton.textContent = "スタート";
        startButton.classList.remove("reset");
        releaseWakeLock();
        clearTimerState();
        setRunning(false);
        updateIdleDisplay();
      };

      const stopTimer = () => {
        if (timerId) {
          window.clearInterval(timerId);
          timerId = null;
        }
        isFinished = false;
        firstAlarmPlayed = false;
        updateKitchenState();
        releaseWakeLock();
        clearTimerState();
        setRunning(false);
        updateIdleDisplay();
      };

      const finishTimer = ({ playSound = true } = {}) => {
        window.clearInterval(timerId);
        timerId = null;
        remainingSeconds = 0;
        firstAlarmPlayed = true;
        updateKitchenState();
        timeEl.textContent = formatTime(0);
        updateInstruction("完成", "卵を冷やしてから殻をむく\n熱いので気をつけて！");
        isFinished = true;
        updateKitchenState();
        startButton.disabled = false;
        startButton.textContent = "リセット";
        startButton.classList.add("reset");
        stopButton.disabled = true;
        choiceButtons.forEach((button) => {
          button.disabled = true;
        });
        sampleButtons.forEach((button) => {
          button.disabled = true;
        });
        releaseWakeLock();
        saveTimerState();
        if (playSound) {
          playAlarmSound(7);
          showToast("完成！卵を冷やしましょう 🥚");
        }
      };

      const tick = (isCatchUp = false) => {
        const now = Date.now();
        remainingSeconds = (endsAt - now) / 1000;

        if (!firstAlarmPlayed && now >= firstAlarmAt) {
          firstAlarmPlayed = true;
          updateKitchenState();
          updateInstruction("火を消す", "火を消してアラームが鳴るまで蒸らす");
          if (!isCatchUp || remainingSeconds > 0) {
            playAlarmSound(4);
            showToast("火を消してください");
          }
        }

        if (remainingSeconds <= 0) {
          finishTimer();
          return;
        }

        if (!firstAlarmPlayed) {
          const firstRemaining = (firstAlarmAt - now) / 1000;
          timeEl.textContent = formatTime(firstRemaining);
          updateInstruction("加熱中", "アラームを待つ");
        } else {
          timeEl.textContent = formatTime(remainingSeconds);
          updateInstruction("火を消す", "火を消してアラームが鳴るまで蒸らす");
        }

        saveTimerState();
      };

      const startTimer = async () => {
        ensureAudioContext();
        requestWakeLock();

        firstAlarmPlayed = false;
        updateKitchenState();
        startedAt = Date.now();
        firstAlarmAt = startedAt + FIRST_ALARM_SECONDS * 1000;
        endsAt = startedAt + totalSeconds() * 1000;
        setRunning(true);
        saveTimerState();
        tick();
        timerId = window.setInterval(tick, 250);
      };

      const restoreTimerState = () => {
        const savedState = localStorage.getItem("eggTimerState");
        if (!savedState) return false;

        try {
          const state = JSON.parse(savedState);
          afterBoilSeconds = Number(state.afterBoilSeconds);
          endsAt = Number(state.endsAt);
          firstAlarmAt = Number(state.firstAlarmAt);
          firstAlarmPlayed = Boolean(state.firstAlarmPlayed);
          isFinished = Boolean(state.isFinished);
          const restoredSound = Number(state.selectedSound);
          selectedSound = ALARM_SAMPLES.some((sample) => sample.id === restoredSound)
            ? restoredSound
            : selectedSound;
          startedAt = Number(state.startedAt);
        } catch {
          clearTimerState();
          return false;
        }

        updateSoundSelection();
        updateChoiceSelection();

        if (isFinished) {
          finishTimer({ playSound: false });
          return true;
        }

        if (Date.now() >= endsAt) {
          finishTimer();
          return true;
        }

        setRunning(true);
        requestWakeLock();
        tick(true);
        timerId = window.setInterval(tick, 250);
        return true;
      };

      const catchUpTimer = () => {
        if (!timerId || isFinished) return;
        tick(true);
      };

      choiceButtons.forEach((button) => {
        button.addEventListener("click", () => {
          afterBoilSeconds = afterSecondsFor(button);
          localStorage.setItem("eggTimerAfterSeconds", button.dataset.after);
          updateChoiceSelection();
          clearTimerState();
          updateIdleDisplay();
        });
      });

      startButton.addEventListener("click", () => {
        if (isFinished) {
          resetTimer();
          return;
        }

        startTimer();
      });
      stopButton.addEventListener("click", () => stopTimer());
      openHomeGuideButton.addEventListener("click", () => openInfoModal("home", openHomeGuideButton));
      openShareGuideButton.addEventListener("click", () => openInfoModal("share", openShareGuideButton));
      closeInfoButton.addEventListener("click", closeInfoModal);
      shareAppButton.addEventListener("click", shareApp);
      copyAppUrlButton.addEventListener("click", copyShareUrl);
      infoModal.addEventListener("click", (event) => {
        if (event.target === infoModal) closeInfoModal();
      });
      openSamplesButton.addEventListener("click", openSampleModal);
      closeSamplesButton.addEventListener("click", closeSampleModal);
      confirmSampleButton.addEventListener("click", selectDebugSample);
      sampleModal.addEventListener("click", (event) => {
        if (event.target === sampleModal) closeSampleModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && infoModal.classList.contains("open")) {
          closeInfoModal();
          return;
        }

        if (event.key === "Escape" && sampleModal.classList.contains("open")) {
          closeSampleModal();
        }
      });

      updateSoundSelection();
      updateChoiceSelection();
      updateGuideButtons();
      registerServiceWorker();
      if (!restoreTimerState()) {
        updateIdleDisplay();
      }

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          if (timerId && !isFinished) requestWakeLock();
          catchUpTimer();
        }
      });
      window.addEventListener("focus", catchUpTimer);
      window.addEventListener("pageshow", catchUpTimer);
      window.addEventListener("pagehide", saveTimerState);

    </script>
  </body>
</html>
